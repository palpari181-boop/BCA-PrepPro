.video-container{

    margin-bottom:12px;
}

iframe{
    width:100%;
    height:220px;   /* Chhota video */
    border:none;
    border-radius:10px;
}

/* Mobile Responsive */
@media(max-width:768px){
    .video-container{
        grid-template-columns:1fr;

    iframe{

    }
}
